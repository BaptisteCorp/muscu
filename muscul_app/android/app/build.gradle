plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Charge la config de signature release depuis android/key.properties (non
// versionné). Absent → on retombe sur les clés debug pour que `flutter run
// --release` et les builds dev fonctionnent sans keystore. Voir RELEASE.md.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.reps.app"
    compileSdk = 35
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.reps.app"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 21
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias = keystoreProperties["keyAlias"]
                keyPassword = keystoreProperties["keyPassword"]
                storeFile = keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
                storePassword = keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            // Vraie clé de signature si key.properties existe, sinon clés debug
            // (builds dev / CI sans keystore). cf. RELEASE.md.
            signingConfig = keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
            // Désactive R8 / shrinking : sans règles ad hoc, R8 obscurcit
            // FileProvider et casse l'ouverture de l'appareil photo (image_picker
            // → IncompatibleClassChangeError sur androidx.core.content.FileProvider).
            // L'APK est ~5 Mo plus gros mais la caméra fonctionne.
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}
